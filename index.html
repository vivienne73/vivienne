<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivienne</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    font-family:Inter, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    radial-gradient(900px 700px at 30% 30%, rgba(255, 230, 240, 0.4), transparent 60%),
    radial-gradient(900px 700px at 70% 40%, rgba(230, 240, 255, 0.4), transparent 60%),
    linear-gradient(180deg, #ffffff, #f7f9ff);
    overflow:hidden;
}

.glass{
    width:90%;
    max-width:560px;
    padding:50px 40px;
    border-radius:28px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 20px 60px rgba(0,0,0,0.05);
    text-align:center;
    transition:all 0.4s ease;
}

h1{
    font-family:"Playfair Display", serif;
    font-size:54px;
    font-weight:500;
    color:#222;
    margin-bottom:10px;
}

p{
    font-size:16px;
    color:rgba(0,0,0,0.55);
    margin-bottom:30px;
}

button{
    padding:12px 26px;
    border-radius:30px;
    border:none;
    font-size:14px;
    cursor:pointer;
    background:rgba(255, 220, 235, 0.5);
    transition:all 0.3s ease;
}

button:hover{
    background:rgba(220, 230, 255, 0.6);
}

.circle{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    pointer-events:none;
    animation:fade 2.5s ease forwards;
}

@keyframes fade{
    0%{opacity:0.8; transform:scale(0.3);}
    100%{opacity:0; transform:scale(3);}
}
</style>
</head>

<body>

<div class="glass">
    <h1>Vivienne</h1>
    <p>a soft interactive field</p >
    <button onclick="toggle()">touch the space</button>
</div>

<script>
let active = false;

function toggle(){
    active = !active;
}

document.addEventListener("click", function(e){
    if(!active) return;

    const circle = document.createElement("div");
    circle.classList.add("circle");

    const pink = "rgba(255,200,220,0.6)";
    const blue = "rgba(200,220,255,0.6)";

    circle.style.background = Math.random()>0.5 ? pink : blue;
    circle.style.left = e.clientX - 10 + "px";
    circle.style.top = e.clientY - 10 + "px";

    document.body.appendChild(circle);

    setTimeout(()=>{
        circle.remove();
    },2500);
});
</script>

</body>
</html>
